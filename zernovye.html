<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Зерновые 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --gd:#7a5c00;--gm:#c4930a;--gl:#e8b84b;--gp:#fdf3dc;--gbg:#faf6ec;
  --rd:#c0392b;--td:#2a1f00;--tm:#6b5520;--tl:#b09050;
  --w:#fff;--sh:0 2px 12px rgba(180,130,0,.12);--r:14px;
  --gr:#2d6a2d;--grm:#4a9b3f;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:-apple-system,'Segoe UI',sans-serif;background:var(--gbg);color:var(--td);min-height:100vh}
body{max-width:440px;margin:0 auto}
/* LOAD */
#ls{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;text-align:center}
.li{font-size:56px;margin-bottom:16px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.lt{font-size:17px;font-weight:700;color:var(--gd);margin-bottom:8px}
.lsub{font-size:13px;color:var(--tm);line-height:1.5}
#lerr{display:none;margin-top:16px;background:#fde8e6;border-radius:10px;padding:12px 16px;font-size:12px;color:var(--rd);line-height:1.6}
/* APP */
#app{display:none}
/* HEADER */
.hdr{background:linear-gradient(135deg,var(--gd),var(--gm));padding:15px 16px 11px;position:sticky;top:0;z-index:100;box-shadow:0 3px 14px rgba(120,80,0,.28)}
.hr{display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:14px;font-weight:700;color:#fff}
.hdr p{font-size:11px;color:rgba(255,255,255,.65);margin-top:2px}
.back{background:rgba(255,255,255,.2);color:#fff;font-size:12px;font-weight:600;padding:5px 11px;border-radius:20px;white-space:nowrap;text-decoration:none;display:inline-block}
/* CULTURE TABS */
.ctabs{background:var(--w);border-bottom:2px solid var(--gp);overflow-x:auto;display:flex;scrollbar-width:none;padding:0 8px}
.ctabs::-webkit-scrollbar{display:none}
.ctab{flex-shrink:0;padding:10px 14px;font-size:12px;font-weight:600;color:var(--tl);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:.15s;user-select:none}
.ctab.on{color:var(--gm);border-bottom-color:var(--gm)}
/* BODY */
.body{padding:12px 13px 82px}
.tab{display:none}.tab.on{display:block}
/* KPI */
.kpi{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px}
.kc{background:var(--w);border-radius:var(--r);padding:12px 11px;box-shadow:var(--sh);position:relative;overflow:hidden}
.kc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gl)}
.kc.w::before{background:#e8a920}.kc.g::before{background:var(--grm)}
.kl{font-size:10px;color:var(--tl);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.kv{font-size:20px;font-weight:800;color:var(--gd);line-height:1}
.kv em{font-size:11px;font-weight:500;color:var(--tm);font-style:normal}
.kp{font-size:11px;color:var(--tm);margin-top:3px}
.bdg{display:inline-block;font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;margin-top:4px}
.br{background:#fde8e6;color:var(--rd)}.bg{background:#e6f4e3;color:var(--gr)}.by{background:#fef4e0;color:#b07a00}
/* INFO ROWS */
.st{font-size:11px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:.6px;margin:14px 0 7px}
.info-card{background:var(--w);border-radius:var(--r);padding:13px;box-shadow:var(--sh);margin-bottom:10px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--gp)}
.info-row:last-child{border:none}
.ir-l{font-size:12px;color:var(--tm)}
.ir-v{font-size:12px;font-weight:700;color:var(--gd);text-align:right}
/* CHART */
.cc{background:var(--w);border-radius:var(--r);padding:12px 11px;box-shadow:var(--sh);margin-bottom:10px}
.ct{font-size:12px;font-weight:700;color:var(--td);margin-bottom:9px}
/* МЕСТО В РАЙОНЕ */
.rank-card{background:var(--w);border-radius:var(--r);padding:13px;box-shadow:var(--sh);margin-bottom:10px;display:flex;align-items:center;gap:12px}
.rank-num{font-size:36px;font-weight:900;color:var(--gm);min-width:54px;text-align:center;line-height:1}
.rank-info{flex:1}
.rank-title{font-size:12px;color:var(--tm);margin-bottom:2px}
.rank-sub{font-size:11px;color:var(--tl)}
/* ЕЖЕДНЕВНАЯ ТАБЛИЦА */
.dl{display:flex;flex-direction:column;gap:6px}
.di{background:var(--w);border-radius:10px;padding:10px 12px;box-shadow:var(--sh)}
.di-top{display:flex;align-items:center;gap:10px}
.dd{min-width:58px;font-size:11px;color:var(--tl)}
.dw{flex:1}
.dbg{height:8px;background:var(--gp);border-radius:4px;overflow:hidden}
.dbar{height:100%;border-radius:4px;background:var(--gm)}
.dv{font-size:12px;font-weight:700;color:var(--gd);min-width:70px;text-align:right}
.di-sub{display:flex;gap:12px;margin-top:5px;padding-left:68px}
.di-meta{font-size:10px;color:var(--tl)}
/* NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:440px;background:var(--w);border-top:1px solid var(--gp);display:flex;justify-content:space-around;padding:7px 0 10px;z-index:200}
.nb{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:var(--tl);cursor:pointer;padding:3px 10px;transition:color .15s;user-select:none}
.nb.on{color:var(--gm)}
.ni{font-size:20px;line-height:1}
.ib{background:var(--gp);border-left:3px solid var(--gm);border-radius:8px;padding:9px 11px;font-size:12px;color:var(--tm);margin-bottom:10px;line-height:1.5}
.ib strong{color:var(--gd)}
.empty{color:var(--tl);font-size:13px;text-align:center;padding:24px}
/* СВОДКА ВСЕ КУЛЬТУРЫ */
.cult-card{background:var(--w);border-radius:var(--r);padding:13px;box-shadow:var(--sh);margin-bottom:10px;cursor:pointer;transition:.15s}
.cult-card:active{transform:scale(.98)}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cn{font-size:13px;font-weight:700;color:var(--td)}
.ce{font-size:11px;color:var(--tl)}
.pb{height:8px;background:var(--gp);border-radius:4px;overflow:hidden;margin-bottom:4px}
.pbar{height:100%;background:linear-gradient(90deg,var(--gm),var(--gl));border-radius:4px;transition:width .5s}
.pbar.nd{background:repeating-linear-gradient(45deg,#e8d8a0,#e8d8a0 4px,var(--gp) 4px,var(--gp) 8px);width:100%!important}
</style>
</head>
<body>

<div id="ls">
  <div class="li">🌾</div>
  <div class="lt">Загрузка отчёта…</div>
  <div class="lsub">Читаем данные зерновых культур</div>
  <div id="lerr">⚠️ Не удалось загрузить данные.<br>Убедитесь что файл <strong>zernovye_2026.xlsx</strong> загружен в репозиторий GitHub</div>
</div>

<div id="app">
  <div class="hdr">
    <div class="hr">
      <div><h1>🌾 Зерновые 2026</h1><p id="hsub">Оперативная сводка</p></div>
      <a class="back" href="index.html">← Меню</a>
    </div>
  </div>

  <div class="ctabs" id="ctabs"></div>

  <div class="body" id="tbody"></div>

  <div class="nav">
    <div class="nb on" onclick="goTab('summary',this)"><div class="ni">📊</div><div>Сводка</div></div>
    <div class="nb" onclick="goTab('detail',this)"><div class="ni">📋</div><div>Детали</div></div>
    <div class="nb" onclick="goTab('history',this)"><div class="ni">📈</div><div>История</div></div>
  </div>
</div>

<script>
const REPO = 'Margo26stavr/uborka_2026';
const FILE = `https://raw.githubusercontent.com/${REPO}/main/zernovye_2026.xlsx`;

let D = {};
let activeCult = 0; // индекс культуры
let activeTab = 'summary';
let charts = {};

// ── ЗАГРУЗКА ──────────────────────────────────────────────
async function load() {
  try {
    const r = await fetch(FILE + '?t=' + Date.now(), {cache:'no-store'});
    if (!r.ok) throw 0;
    D = parse(XLSX.read(await r.arrayBuffer(), {type:'array', cellDates:true}));
    document.getElementById('ls').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  } catch(e) {
    document.querySelector('.li').textContent = '⚠️';
    document.querySelector('.li').style.animation = 'none';
    document.querySelector('.lt').textContent = 'Не удалось загрузить данные';
    document.getElementById('lerr').style.display = 'block';
  }
}

// ── ПАРСИНГ ───────────────────────────────────────────────
function cv(sh,r,c){ const cell=sh[XLSX.utils.encode_cell({r,c})]; return cell?cell.v:null; }
function toDate(v){ if(!v)return null; if(v instanceof Date)return v; if(typeof v==='number')return new Date(Math.round((v-25569)*86400000)); try{const d=new Date(v);return isNaN(d)?null:d;}catch{return null;} }
function fmtD(v){ const d=toDate(v); if(!d)return null; return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'}); }

function parseCulture(sh, name, color, emoji) {
  if (!sh) return null;
  // Строки 4-15 — основная таблица показателей
  // col 2=2020, 3=2021, 4=2022, 5=2023, 6=2024, 7=2025, 8=2026
  const years = [2020,2021,2022,2023,2024,2025,2026];
  const histYield = [], histTotal = [], histArea = [];
  for (let yi=0; yi<7; yi++) {
    histTotal.push(+cv(sh,10,2+yi)||0);
    histArea.push(+cv(sh,12,2+yi)||0);
    histYield.push(+cv(sh,13,2+yi)||0);
  }
  const startDate  = fmtD(cv(sh,5,8))  || fmtD(cv(sh,5,7));
  const endDate    = fmtD(cv(sh,6,8))  || null;
  const calDays    = cv(sh,7,8);
  const factDays   = cv(sh,8,8);
  const techCount  = cv(sh,9,8);
  const rankDistr  = String(cv(sh,15,8)||'');
  const rankAvg    = +cv(sh,14,8)||0;
  const planVal    = +cv(sh,19,2)||0;
  const factVal    = +cv(sh,20,2)||0;
  const planYield  = +cv(sh,19,3)||0;
  const factYield  = +cv(sh,20,3)||0;
  const exArea     = +cv(sh,22,2)||0;
  const exVal      = +cv(sh,23,2)||0;

  // Ежедневные данные — col 11=дата, 12=площадь, 13=валовый кг, 14=урожайность
  const daily = [];
  for (let ri = 5; ri <= 30; ri++) {
    const dt = cv(sh,ri,11);
    const ar = cv(sh,ri,12);
    const kg = cv(sh,ri,13);
    const yd = cv(sh,ri,14);
    if (dt && toDate(dt) && kg && kg > 0) {
      daily.push({date:toDate(dt), area:+ar||0, kg:+kg||0, tn:(+kg||0)/1000, yield:+yd||0});
    }
  }

  return {name, color, emoji, years, histYield, histTotal, histArea,
    startDate, endDate, calDays, factDays, techCount,
    rankDistr, rankAvg, planVal, factVal, planYield, factYield,
    exArea, exVal, daily,
    factArea: histArea[6], planArea: 0};
}

function parse(wb) {
  const sheets = wb.SheetNames;
  const cultures = [];

  // Озимая пшеница
  if (sheets.includes('Озимая пшеница')) {
    const sh = wb.Sheets['Озимая пшеница'];
    const c = parseCulture(sh,'Озимая пшеница','#c4930a','🌾');
    if (c) {
      c.planArea = +cv(sh,19,2)||0; // план тн
      c.planVal  = +cv(sh,19,2)||0;
      c.factVal  = +cv(sh,20,2)||0;
      c.planYield= +cv(sh,19,3)||0;
      c.factYield= +cv(sh,20,3)||0;
      c.exArea   = +cv(sh,22,2)||0;
      c.exVal    = +cv(sh,23,2)||0;
      c.factArea = c.histArea[6];
      // Статистика из листа Статистика
      if (sheets.includes('Статистика')) {
        const ss = wb.Sheets['Статистика'];
        c.rankTable = [];
        for (let ri=59; ri<=68; ri++) {
          const org = cv(ss,ri,0);
          const yld = cv(ss,ri,1);
          const pl  = cv(ss,ri,2);
          if (org && yld) c.rankTable.push({org:String(org), yield:+yld, place:+pl||0});
        }
      }
      cultures.push(c);
    }
  }

  // Горох на зерно
  if (sheets.includes('Горох на зерно')) {
    const sh = wb.Sheets['Горох на зерно'];
    const c = parseCulture(sh,'Горох на зерно','#6b8e23','🫛');
    if (c) {
      c.planVal  = +cv(sh,19,2)||0;
      c.factVal  = +cv(sh,20,2)||0;
      c.factYield= +cv(sh,20,3)||0;
      c.exArea   = +cv(sh,22,2)||0;
      c.exVal    = +cv(sh,23,2)||0;
      c.factArea = c.histArea[6];
      // Ежедневные данные из колонки 11=дата, 12=нет, 13=кг, 14=урож
      // В Горох на зерно даты в col 11, данные иначе
      c.daily = [];
      for (let ri=5; ri<=11; ri++) {
        const dt = cv(sh,ri,11);
        const kg = cv(sh,ri,12); // тут площадь?
        const ar2 = cv(sh,ri,13);
        if (dt && toDate(dt) && ar2 && ar2>0) {
          c.daily.push({date:toDate(dt), area:+kg||0, kg:+ar2*1000||0, tn:+ar2||0, yield:+cv(sh,ri,14)||0});
        }
      }
      cultures.push(c);
    }
  }

  // Подсолнечник
  if (sheets.includes('Подсолнечник')) {
    const sh = wb.Sheets['Подсолнечник'];
    const c = parseCulture(sh,'Подсолнечник','#e8b84b','🌻');
    if (c) {
      c.planVal  = +cv(sh,19,2)||0;
      c.factVal  = +cv(sh,20,2)||0;
      c.planYield= +cv(sh,19,3)||0;
      c.factYield= +cv(sh,20,3)||0;
      c.exArea   = +cv(sh,22,2)||0;
      c.exVal    = +cv(sh,23,2)||0;
      c.factArea = c.histArea[6];
      cultures.push(c);
    }
  }

  // Кукуруза на зерно
  if (sheets.includes('Кукуруза на зерно')) {
    const sh = wb.Sheets['Кукуруза на зерно'];
    const c = parseCulture(sh,'Кукуруза на зерно','#e07b39','🌽');
    if (c) {
      c.planVal  = +cv(sh,19,2)||0;
      c.factVal  = +cv(sh,20,2)||0;
      c.planYield= +cv(sh,19,3)||0;
      c.factYield= +cv(sh,20,3)||0;
      c.exArea   = +cv(sh,22,2)||0;
      c.exVal    = +cv(sh,23,2)||0;
      c.factArea = c.histArea[6];
      cultures.push(c);
    }
  }

  // Дата последнего обновления
  const today = new Date().toLocaleDateString('ru-RU',{day:'numeric',month:'long'});
  return {cultures, today};
}

// ── ИНИЦИАЛИЗАЦИЯ ─────────────────────────────────────────
function init() {
  document.getElementById('hsub').textContent = 'По состоянию на ' + D.today;
  buildCultTabs();
  render();
}

function buildCultTabs() {
  const wrap = document.getElementById('ctabs');
  wrap.innerHTML = '';
  // Добавляем "Все" + каждую культуру
  const tabs = [{name:'Все', emoji:'📋'}, ...D.cultures.map(c=>({name:c.name.split(' ')[0], emoji:c.emoji}))];
  tabs.forEach((t,i) => {
    const el = document.createElement('div');
    el.className = 'ctab' + (i===activeCult?' on':'');
    el.textContent = t.emoji + ' ' + t.name;
    el.onclick = () => {
      activeCult = i;
      wrap.querySelectorAll('.ctab').forEach(e=>e.classList.remove('on'));
      el.classList.add('on');
      render();
    };
    wrap.appendChild(el);
  });
}

function render() {
  Object.values(charts).forEach(c=>{ try{c.destroy();}catch{} });
  charts = {};
  if (activeCult === 0) renderAll();
  else renderCulture(D.cultures[activeCult-1]);
}

// ── СВОДКА ВСЕХ КУЛЬТУР ───────────────────────────────────
function renderAll() {
  const body = document.getElementById('tbody');
  const tabs = ['summary','detail','history'];
  // Для "Все" — только сводка
  body.innerHTML = `
    <div class="tab on" id="tab-summary">
      <div class="st">Культуры сезона 2026</div>
      <div id="cultCards"></div>
      <div class="cc">
        <div class="ct">Выполнение плана по валу, %</div>
        <div style="position:relative;height:200px"><canvas id="cAll"></canvas></div>
      </div>
    </div>
    <div class="tab" id="tab-detail"><div class="empty">Выберите культуру для детального просмотра</div></div>
    <div class="tab" id="tab-history"><div class="empty">Выберите культуру для просмотра истории</div></div>
  `;
  // Активная вкладка
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('tab-'+activeTab)?.classList.add('on');

  // Карточки культур
  document.getElementById('cultCards').innerHTML = D.cultures.map((c,i) => {
    const pct = c.planVal>0 ? Math.round(c.factVal/c.planVal*100) : 0;
    const bc = pct>=50?'bg':pct>=15?'by':'br';
    const started = c.startDate ? `Начало: ${c.startDate}` : 'Не начата';
    return `<div class="cult-card" onclick="selectCult(${i+1})">
      <div class="ch"><span class="cn">${c.emoji} ${c.name}</span><span class="ce">${started}</span></div>
      <div class="pb"><div class="pbar${pct===0?' nd':''}" style="width:${pct>0?Math.max(pct,3):100}%"></div></div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:11px;color:var(--tm)">${N(c.factVal)} / ${N(c.planVal)} т</span>
        <span class="bdg ${bc}">${pct}%</span>
      </div>
    </div>`;
  }).join('');

  // График сводный
  setTimeout(()=>{
    const ctx = document.getElementById('cAll');
    if (!ctx) return;
    charts.all = new Chart(ctx.getContext('2d'),{
      type:'bar',
      data:{
        labels: D.cultures.map(c=>c.emoji+' '+c.name.split(' ')[0]),
        datasets:[{
          data: D.cultures.map(c=>c.planVal>0?+(c.factVal/c.planVal*100).toFixed(1):0),
          backgroundColor: D.cultures.map(c=>c.color),
          borderRadius:8
        }]
      },
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.raw}%`}}},
        scales:{y:{beginAtZero:true,max:110,grid:{color:'#f0e8cc'},ticks:{font:{size:10},callback:v=>v+'%'}},
                x:{grid:{display:false},ticks:{font:{size:10}}}}}
    });
  },100);
}

function selectCult(i) { activeCult = i; buildCultTabs(); render(); }

// ── ДЕТАЛЬНЫЙ ПРОСМОТР КУЛЬТУРЫ ───────────────────────────
function renderCulture(c) {
  const body = document.getElementById('tbody');
  const pctV = c.planVal>0 ? (c.factVal/c.planVal*100).toFixed(1) : 0;
  const pctA = c.factArea>0&&c.histArea[5]>0 ? (c.factArea/c.histArea[5]*100).toFixed(1) : '—';
  const dy   = c.planYield>0&&c.factYield>0 ? ((c.factYield-c.planYield)/c.planYield*100).toFixed(1) : 0;

  body.innerHTML = `
    <div class="tab on" id="tab-summary">
      <div class="kpi">
        <div class="kc w">
          <div class="kl">Валовый сбор</div>
          <div class="kv">${N(c.factVal)} <em>т</em></div>
          <div class="kp">план: ${N(c.planVal)} т</div>
          <span class="bdg ${+pctV>=50?'bg':+pctV>=15?'by':'br'}">${pctV}%</span>
        </div>
        <div class="kc w">
          <div class="kl">Площадь уборки</div>
          <div class="kv">${N(c.factArea)} <em>га</em></div>
          <div class="kp">уборка идёт</div>
          <span class="bdg by">${pctA}%</span>
        </div>
        <div class="kc g">
          <div class="kl">Урожайность</div>
          <div class="kv">${c.factYield>0?c.factYield.toFixed(1):'—'} <em>ц/га</em></div>
          <div class="kp">план: ${c.planYield>0?c.planYield.toFixed(1):'—'} ц/га</div>
          <span class="bdg ${+dy>=0?'bg':'br'}">${dy>0?'+':''}${dy}%</span>
        </div>
        <div class="kc">
          <div class="kl">Выполнение</div>
          <div class="kv">${pctV} <em>%</em></div>
          <div class="kp">от плана</div>
          <span class="bdg ${+pctV>=50?'bg':+pctV>=15?'by':'br'}">${N(c.factVal)} т</span>
        </div>
      </div>
      ${c.rankTable && c.rankTable.length ? renderRank(c) : ''}
      <div class="cc">
        <div class="ct">Выполнение план/факт</div>
        <div style="position:relative;height:170px"><canvas id="cPlan"></canvas></div>
      </div>
    </div>

    <div class="tab" id="tab-detail">
      <div class="st">Параметры уборки 2026</div>
      <div class="info-card">
        ${infoRow('Начало уборки', c.startDate||'—')}
        ${infoRow('Окончание уборки', c.endDate||'ожидается')}
        ${infoRow('Календарных дней', c.calDays||'—')}
        ${infoRow('Фактических дней', c.factDays||'—')}
        ${infoRow('Техника', c.techCount||'—')}
        ${infoRow('Место в районе', c.rankDistr||'—')}
        ${infoRow('Ср. по району, ц/га', c.rankAvg>0?c.rankAvg.toFixed(1)+' ц/га':'—')}
      </div>
      ${c.daily.length ? `
        <div class="st">Ежедневные данные</div>
        <div class="ib"><strong>Итого:</strong> ${N(c.daily.reduce((s,r)=>s+r.tn,0))} т · <strong>Дней:</strong> ${c.daily.length}</div>
        <div class="dl" id="dailyList"></div>
      ` : '<div class="empty">Нет ежедневных данных</div>'}
    </div>

    <div class="tab" id="tab-history">
      <div class="cc">
        <div class="ct">Урожайность по годам, ц/га</div>
        <div style="position:relative;height:220px"><canvas id="cHist"></canvas></div>
      </div>
      <div class="cc">
        <div class="ct">Валовый сбор по годам, т</div>
        <div style="position:relative;height:200px"><canvas id="cTotal"></canvas></div>
      </div>
    </div>
  `;

  // Активная вкладка
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('tab-'+activeTab)?.classList.add('on');

  // Ежедневный список
  if (c.daily.length) {
    const maxT = Math.max(...c.daily.map(r=>r.tn),1);
    document.getElementById('dailyList').innerHTML = c.daily.map(r=>{
      const w = Math.round(r.tn/maxT*100);
      return `<div class="di">
        <div class="di-top">
          <div class="dd">${r.date.toLocaleDateString('ru-RU',{day:'numeric',month:'short'})}</div>
          <div class="dw"><div class="dbg"><div class="dbar" style="width:${w}%;background:${c.color}"></div></div></div>
          <div class="dv">${N(r.tn)} т</div>
        </div>
        <div class="di-sub">
          ${r.area>0?`<span class="di-meta">📐 ${N(r.area)} га</span>`:''}
          ${r.yield>0?`<span class="di-meta">⬆ ${r.yield.toFixed(1)} ц/га</span>`:''}
        </div>
      </div>`;
    }).join('');
  }

  setTimeout(()=>{
    // График план/факт
    const cp = document.getElementById('cPlan');
    if (cp) {
      charts.plan = new Chart(cp.getContext('2d'),{
        type:'bar',
        data:{labels:['Вал. сбор, т','Урожайность, ц/га'],
          datasets:[
            {label:'План',data:[c.planVal,c.planYield],backgroundColor:'rgba(196,147,10,.25)',borderColor:c.color,borderWidth:2,borderRadius:6},
            {label:'Факт',data:[c.factVal,c.factYield],backgroundColor:c.color,borderRadius:6}
          ]},
        options:{responsive:true,maintainAspectRatio:false,
          plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:12}}},
          scales:{y:{beginAtZero:true,grid:{color:'#f0e8cc'},ticks:{font:{size:10}}},x:{grid:{display:false},ticks:{font:{size:10}}}}}
      });
    }

    // История урожайность
    const ch = document.getElementById('cHist');
    if (ch) {
      charts.hist = new Chart(ch.getContext('2d'),{
        type:'bar',
        data:{labels:c.years, datasets:[{
          data:c.histYield,
          backgroundColor:c.years.map(y=>y===2026?c.color:'rgba(196,147,10,.3)'),
          borderRadius:6
        }]},
        options:{responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false},tooltip:{callbacks:{label:x=>` ${x.raw.toFixed(1)} ц/га`}}},
          scales:{y:{beginAtZero:true,grid:{color:'#f0e8cc'},ticks:{font:{size:10}}},x:{grid:{display:false},ticks:{font:{size:10}}}}}
      });
    }

    // История вал
    const ct = document.getElementById('cTotal');
    if (ct) {
      charts.total = new Chart(ct.getContext('2d'),{
        type:'bar',
        data:{labels:c.years, datasets:[{
          data:c.histTotal,
          backgroundColor:c.years.map(y=>y===2026?c.color:'rgba(196,147,10,.3)'),
          borderRadius:6
        }]},
        options:{responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false},tooltip:{callbacks:{label:x=>` ${N(x.raw)} т`}}},
          scales:{y:{beginAtZero:true,grid:{color:'#f0e8cc'},ticks:{font:{size:10}}},x:{grid:{display:false},ticks:{font:{size:10}}}}}
      });
    }
  },100);
}

function renderRank(c) {
  if (!c.rankTable || !c.rankTable.length) return '';
  const our = c.rankTable.find(r=>r.org.toLowerCase().includes('грин'));
  if (!our) return '';
  return `
    <div class="rank-card">
      <div class="rank-num">${our.place}/${c.rankTable.length}</div>
      <div class="rank-info">
        <div class="rank-title">Место в районе</div>
        <div class="rank-sub">${our.yield.toFixed(2)} ц/га · ${c.rankTable[0].org} лидер: ${c.rankTable[0].yield.toFixed(2)} ц/га</div>
      </div>
    </div>`;
}

function infoRow(l,v) { return `<div class="info-row"><span class="ir-l">${l}</span><span class="ir-v">${v}</span></div>`; }
function N(n){ return (n==null||isNaN(n)||n==='')?'—':(+n).toLocaleString('ru',{maximumFractionDigits:1}); }

function goTab(name,el) {
  activeTab = name;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  const t = document.getElementById('tab-'+name);
  if(t) t.classList.add('on');
  el.classList.add('on');
}

load();
</script>
</body>
</html>
